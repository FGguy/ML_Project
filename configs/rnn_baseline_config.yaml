model: rnn

# Downsampling: take every Nth sample from the waveform to reduce sequence
# length to ~fixed_time_frames steps (256 = hop_length, matching mel resolution)
downsample_factor: 256

hidden_size: 128
num_classes: 6

# Training
batch_size: 32
lr: 0.001
epochs: 100
patience: 15
num_workers: 0
