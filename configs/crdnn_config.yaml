model: crdnn

# CNN blocks applied to the mel spectrogram (1, 64, 1135).
# Each entry: [out_channels, kernel_size, pool_size].
# After 3 blocks: freq 64 -> 32 -> 16 -> 8, time 1135 -> 567 -> 283 -> 141.
cnn_blocks:
  - [16, 3, 2]
  - [32, 3, 2]
  - [64, 3, 2]

gru_hidden: 64
dropout: 0.3
num_classes: 6

# Training
batch_size: 16
lr: 0.001
epochs: 100
patience: 15
num_workers: 0
