model: crdnn

# CNN blocks applied to the mel spectrogram.
# Each entry: [out_channels, kernel_size, pool_size].
# The first block uses a multi-scale parallel-branch design (1×9, 9×1, 3×3)
# when use_multi_scale_first is true — out_channels must be divisible by 3.
# After 3 blocks with pool (2,2): freq 64->32->16->8, time 2270->1135->567->283.
# A final adaptive max-pool then collapses freq to 1 before the GRU.
# Ref: Pons et al. (1703.06697)
cnn_blocks:
  - [18, 3, 2]
  - [36, 3, 2]
  - [72, 3, 2]

# Enable multi-scale parallel branches in the first conv block.
# Ref: Pons et al. (1703.06697)
use_multi_scale_first: true

gru_hidden: 64
dropout: 0.3
# Progressive inter-block dropout (spatial Dropout2d applied after each block).
# Ref: Rossi et al. (DAFx25_paper_16)
inter_dropout_rates: [0.1, 0.2, 0.3]
num_classes: 6

# Training
batch_size: 8
lr: 0.001
# L2 weight decay — achieves loudness invariance by penalising large weights.
# Ref: Pons et al. (1703.06697)
weight_decay: 0.0001
scheduler: cosine
epochs: 100
patience: 15
num_workers: 0

# Mixup alpha > 0 enables Mixup during training.
# Ref: Purwins et al. (1905.00078)
mixup_alpha: 0.2

use_class_weights: true

# SpecAugment parameters — applied on-the-fly to training spectrograms only.
# freq_mask_param: max consecutive mel bins to mask per application.
# time_mask_param: max consecutive time frames to mask per application.
# Ref: Ferreira-Paiva et al. (paper_5085), Purwins et al. (1905.00078)
spec_augment:
  freq_mask_param: 8
  time_mask_param: 50
  num_freq_masks: 1
  num_time_masks: 2
