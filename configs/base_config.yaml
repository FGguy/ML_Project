paths:
  raw_dir: data/raw
  raw_flat_dir: data/raw_flat
  flat_index: data/flat_index.csv
  processed_audio_dir: data/processed/audio
  processed_spectrograms_dir: data/processed/spectrograms
  audio_index: data/processed/audio_index.csv
  splits_dir: data/splits
  mel_stats: data/splits/mel_stats.pt
audio:
  source_sr: 44100
  target_sr: 22050
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  seed: 42
augmentation:
  seed: 42
  # Fraction of training clips to augment (0.0–1.0). 0.5 adds 50% more samples.
  aug_ratio: 0.5
  noise_snr_db: 30
  gain_range:
  - 0.8
  - 1.2
  max_shift_ratio: 0.1
mel:
  n_fft: 1024
  # hop_length halved from 512 → 256 for finer temporal resolution (~11ms frames
  # vs ~23ms). Better captures pick-attack transients that distinguish fuzz/dist.
  # NOTE: re-run mel_precompute.py after changing this — cached .pt files are stale.
  hop_length: 256
  n_mels: 64
  f_min: 80
  f_max: 8000
  power: 2.0
  # Approx 2× the previous value (1135) because hop_length was halved.
  # Verify by running mel_precompute.py and checking the printed median.
  fixed_time_frames: 2270
